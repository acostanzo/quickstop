# Generated by lintguini — see plugins/pronto/references/roll-your-own/lint-posture.md for the source of truth.
# Lenient band — pyflakes + pycodestyle errors + import sorting only. The
# canonical "minimum sensible lint" subset of the rubric's strict select.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.format]
quote-style = "double"
